<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seekho - Learning Platform</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3f2fc;
            color: #333;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: #6a5acd;
            color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header .logo {
            font-size: 24px;
            font-weight: bold;
        }
        .header nav a {
            margin: 0 15px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }
        .header button {
            background-color: #483d8b;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .dashboard {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }
        .dashboard h1 {
            font-size: 36px;
            color: #4b0082;
        }
        .search-bar {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            width: 100%;
        }
        .search-bar input {
            width: 50%;
            padding: 10px;
            border: 1px solid #6a5acd;
            border-radius: 5px;
        }
        .search-bar button {
            background-color: #6a5acd;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            margin-left: 10px;
            cursor: pointer;
        }
        .video-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }
        .video-container iframe {
            margin: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Seekho</div>
        <nav>
            <a href="#">About</a>
            <a href="#">Courses</a>
            <a href="#">Contact Us</a>
        </nav>
        <button onclick="showAuthForm()">Sign In</button>
    </div>

    <div class="dashboard">
        <h1>Welcome to Seekho - Your Tech Learning Hub</h1>
        <p>Enhance your skills with the best courses.</p>
        <div class="search-bar">
            <input type="text" id="searchQuery" placeholder="What do you want to learn?">
            <button onclick="searchVideos()">Search</button>
        </div>
    </div>

    <h2 style="text-align:center;">Videos</h2>
    <div class="video-container" id="videoResults"></div>
    <h2 style="text-align:center;">Playlists</h2>
    <div class="video-container" id="playlistResults"></div>

    <script>
        const API_KEY = 'YOUR_YOUTUBE_API_KEY';
        
        function searchVideos() {
            let query = document.getElementById('searchQuery').value;
            let videoResults = document.getElementById('videoResults');
            let playlistResults = document.getElementById('playlistResults');
            videoResults.innerHTML = '';
            playlistResults.innerHTML = '';
            
            fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&type=video&key=${API_KEY}`)
            .then(response => response.json())
            .then(data => {
                data.items.forEach(item => {
                    let iframe = document.createElement('iframe');
                    iframe.width = "320";
                    iframe.height = "180";
                    iframe.src = `https://www.youtube.com/embed/${item.id.videoId}`;
                    videoResults.appendChild(iframe);
                });
            });
            
            fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&type=playlist&key=${API_KEY}`)
            .then(response => response.json())
            .then(data => {
                data.items.forEach(item => {
                    let iframe = document.createElement('iframe');
                    iframe.width = "320";
                    iframe.height = "180";
                    iframe.src = `https://www.youtube.com/embed/videoseries?list=${item.id.playlistId}`;
                    playlistResults.appendChild(iframe);
                });
            });
        }
        
        function showAuthForm() {
            alert("Authentication system coming soon!");
        }
    </script>
</body>
</html>
